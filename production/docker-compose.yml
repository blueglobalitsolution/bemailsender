version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${MYSQL_DATABASE}
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - WHATSAPP_SERVICE_URL=http://whatsapp:3001
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY}
      - DOMAIN=${DOMAIN}
      - ALLOWED_HOSTS=${DOMAIN}
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=https://${DOMAIN}
      - VITE_DOMAIN=${DOMAIN}
      - VITE_WHATSAPP_SERVICE_URL=https://${DOMAIN}
    restart: unless-stopped

  whatsapp:
    build:
      context: ..
      dockerfile: Dockerfile.whatsapp
    ports:
      - "3001:3001"
    volumes:
      - whatsapp_sessions:/app/.whatsapp-web-jssdk
    environment:
      - PORT=3001
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY}
      - DJANGO_URL=http://backend:8000
      - DOMAIN=${DOMAIN}
      - CLIENT_URL=https://${DOMAIN}
    restart: unless-stopped

volumes:
  mysql_data:
  whatsapp_sessions:
