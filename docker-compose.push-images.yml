version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "--password=${MYSQL_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db_backup:
    image: fradelg/mysql-cron-backup
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - MYSQL_HOST=${DB_HOST}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MAX_BACKUPS=7
      - INIT_BACKUP=0
      - CRON_TIME=0 0 * * *
    volumes:
      - ./backups/mysql:/backup

  backend:
    image: ${BACKEND_IMAGE}
    restart: always
    pull_policy: always
    expose:
      - "8000"
    ports:
      - "3435:8000"
    volumes:
      - ./backend/staticfiles:/app/staticfiles
      - ./backend/media:/app/media
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${MYSQL_DATABASE}
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - WHATSAPP_SERVICE_URL=${WHATSAPP_SERVICE_URL}
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY}
      - DJANGO_LOG_LEVEL=${DJANGO_LOG_LEVEL}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: always
    pull_policy: always
    ports:
      - "3434:80"
    volumes:
      - ./backend/staticfiles:/app/staticfiles
      - ./backend/media:/app/media
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      backend:
        condition: service_healthy



  worker:
    image: ${BACKEND_IMAGE}
    restart: always
    pull_policy: always
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${MYSQL_DATABASE}
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - WHATSAPP_SERVICE_URL=${WHATSAPP_SERVICE_URL}
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    depends_on:
      db:
        condition: service_healthy
    command: [ "python", "manage.py", "process_campaigns" ]

  whatsapp:
    image: ${WHATSAPP_IMAGE}
    restart: always
    pull_policy: always
    ports:
      - "3436:3001"
    volumes:
      - whatsapp_sessions:/app/.whatsapp-web-jssdk
    environment:
      - PORT=${PORT}
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY}
      - DJANGO_URL=${DJANGO_URL}
      - SECRET_KEY=${SECRET_KEY}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
  whatsapp_sessions:
